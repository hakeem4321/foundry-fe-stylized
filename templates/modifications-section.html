<h3>{{localize "FE2.Sheet.Common.Modifications"}}</h3>
<ul>
  {{#each system.modifications as |modification key|}}
  <li class="item flexrow list-item" data-item-id="{{modification._id}}" data-item-type="modifications">
    <span class="competence-label"><a data-action="viewModification">{{modification.name}}</a></span>
    <div class="item-controls">
      <a class="item-control" data-action="deleteEmbedded" title="{{localize "FE2.Sheet.Common.DeleteItem"}}"><i class="fas fa-trash"></i></a>
    </div>
  </li>
  {{/each}}
</ul>
