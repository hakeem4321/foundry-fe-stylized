<h3>{{localize "FE2.Sheet.Common.Variations"}}</h3>
<ul>
  {{#each system.variations as |variation key|}}
  <li class="item flexrow list-item" data-item-id="{{variation._id}}" data-item-type="variations">
    <span class="competence-label"><a data-action="viewVariation">{{variation.name}}</a></span>
    <div class="item-controls">
      <a class="item-control" data-action="deleteEmbedded" title="{{localize "FE2.Sheet.Common.DeleteItem"}}"><i class="fas fa-trash"></i></a>
    </div>
  </li>
  {{/each}}
</ul>
