{{#if title}}
<h3 class="fe2-section-header">{{title}} {{subtitle}}</h3>
{{/if}}

<ul class="fe2-system-fields">
  {{#each stats as |stat key|}}
  <li class="flexrow">
    <label class="generic-label">{{localize stat.label}}</label>
    {{numericStepper name=(concat "system.stats." key ".value") value=stat.value disabled=../readonly}}
    {{#if ../dualMode}}
    <span class="fe2-stat-total">{{lookup (lookup ../statstotal key) "value"}}</span>
    {{/if}}
  </li>
  {{/each}}
</ul>
