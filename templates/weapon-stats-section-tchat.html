  <table class="fe2-stat-table">
    <tr>
      <td>{{localize "FE2.Sheet.Common.Name"}}</td>
      <td>{{localize "FE2.Sheet.Common.Value"}}</td>
    </tr>
    
    {{#each stats as |stat key|}}
    <tr>
      <td>{{localize stat.label}}</td>
      <td>{{stat.value}}</td>
    </tr>
    {{/each}}

  </table>
