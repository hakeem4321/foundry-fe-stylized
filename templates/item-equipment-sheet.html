<div class="{{cssClass}}" autocomplete="off">
    <header class="sheet-header">
        <img class="profile-img" src="{{img}}" data-edit="img" title="{{name}}"/>
        <div class="header-fields">
            <h1 class="charname"><input name="name" type="text" value="{{name}}" placeholder="{{localize "FE2.Sheet.Common.Name"}}"/></h1>
        </div>
    </header>

    {{!-- Sheet Body --}}
    <section class="sheet-body">

        <div class="tab" data-group="primary">
          <ul>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Sheet.Common.Equipped"}}</label>
              <label class="attribute-value checkbox"><input type="checkbox" name="system.equipped" {{checked system.equipped}}/></label>
            </li>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Items.Common.Weight"}}</label>
              <input type="text" name="system.weight" value="{{system.weight}}" data-dtype="Number"/>
            </li>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Items.Common.Cost"}}</label>
              <input type="text" name="system.cost" value="{{system.cost}}" data-dtype="Number"/>
            </li>
          </ul>
          <h3>{{localize "FE2.Sheet.Common.Description"}}</h3>
          <prose-mirror button="true" toggled="true" name="system.description" value="{{system.description}}">{{{enrichedDescription}}}</prose-mirror>
          
        </div>

    </section>
</div>
