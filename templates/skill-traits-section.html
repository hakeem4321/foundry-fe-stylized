<h3>{{localize "FE2.Sheet.Common.Traits"}}</h3>
<ul>
  {{#each system.traits as |trait key|}}
  <li class="item flexrow list-item" data-item-id="{{trait._id}}" data-item-type="traits">
    <span class="competence-label"><a data-action="viewTrait">{{trait.name}}</a></span>
    <div class="item-controls">
      <a class="item-control" data-action="deleteEmbedded" title="{{localize "FE2.Sheet.Common.DeleteItem"}}"><i class="fas fa-trash"></i></a>
    </div>
  </li>
  {{/each}}
</ul>
