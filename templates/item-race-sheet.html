
<div class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
      <img class="profile-img" src="{{img}}" data-edit="img" title="{{name}}"/>
      <div class="header-fields">
          <h1 class="charname"><input name="name" type="text" value="{{name}}" placeholder="{{localize "FE2.Sheet.Common.Name"}}"/></h1>
      </div>
  </header>

  {{!-- Sheet Body --}}
  <section class="sheet-body">
    <div class="tab" data-group="primary">
      <span class="generic-label"><h3>{{localize "FE2.Items.Common.Requirements"}}</h3></span>
      <span class="small-editor item-text-long-line">
        <prose-mirror button="true" toggled="true" name="system.requirements" value="{{system.requirements}}">{{{enrichedRequirements}}}</prose-mirror>
      </span>
      <span class="generic-label"><h3>{{localize "FE2.Items.Common.Benefits"}}</h3></span>
      <span class="small-editor item-text-long-line">
        <prose-mirror button="true" toggled="true" name="system.benefits" value="{{system.benefits}}">{{{enrichedBenefits}}}</prose-mirror>
      </span>
      <span class="generic-label"><h3>{{localize "FE2.Items.Common.Disadvantages"}}</h3></span>
      <span class="small-editor item-text-long-line">
        <prose-mirror button="true" toggled="true" name="system.disadvantages" value="{{system.disadvantages}}">{{{enrichedDisadvantages}}}</prose-mirror>
      </span>
    </div>
  </section>
</div>
