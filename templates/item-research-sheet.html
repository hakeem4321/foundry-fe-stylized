<div class="{{cssClass}}" autocomplete="off">
    <header class="sheet-header">
        <img class="profile-img" src="{{img}}" data-edit="img" title="{{name}}"/>
        <div class="header-fields">
            <h1 class="charname"><input name="name" type="text" value="{{name}}" placeholder="{{localize "FE2.Sheet.Common.Name"}}"/></h1>
        </div>
    </header>

    {{!-- Sheet Body --}}
    <section class="sheet-body">

        <div class="tab" data-group="primary">
          <ul>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Sheet.Character.ResearchUnit"}}</label>
              <input type="text" name="system.researchunit" value="{{system.researchunit}}" data-dtype="Number"/>
            </li>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Items.Research.GainAt12"}}</label>
              <select class="competence-base flexrow" type="text" name="system.research12" value="{{system.research12}}" data-dtype="String">
                {{selectOptions researchGainChoices selected=system.research12}}
              </select>
            </li>
            <li class="flexrow"><label class="generic-label">{{localize "FE2.Items.Research.GainAt16"}}</label>
              <select class="competence-base flexrow" type="text" name="system.research16" value="{{system.research16}}" data-dtype="String">
                {{selectOptions researchGainChoices selected=system.research16}}
              </select>
            </li>
          </ul>
          <h3>{{localize "FE2.Sheet.Common.Description"}}</h3>
          <prose-mirror button="true" toggled="true" name="system.description" value="{{system.description}}">{{{enrichedDescription}}}</prose-mirror>
        </div>

    </section>
</div>
