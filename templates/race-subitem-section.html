<h3 class="fe2-section-header">{{localize headerKey}}</h3>
<ul class="fe2-item-list">
  {{#each items as |item key|}}
  <li class="item flexrow list-item" data-item-id="{{item._id}}" data-item-type="{{../arrayName}}">
    <span class="competence-label"><a data-action="viewRaceSubitem">{{item.name}}</a></span>
    <div class="item-controls">
      <a class="item-control" data-action="deleteEmbedded" title="{{localize "FE2.Sheet.Common.DeleteItem"}}"><i class="fas fa-trash"></i></a>
    </div>
  </li>
  {{/each}}
</ul>
